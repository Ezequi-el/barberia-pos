<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neron POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #09090b;
      /* zinc-950 */
      color: #f4f4f5;
      /* zinc-100 */
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-heading {
      font-family: 'Oswald', sans-serif;
    }

    /* Custom Scrollbar for dark theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* PRINT STYLES - Optimized for 80mm Thermal Printers */
    @media print {

      /* Hide everything */
      body * {
        visibility: hidden;
      }

      /* Show only the receipt */
      #printable-receipt,
      #printable-receipt * {
        visibility: visible;
      }

      #printable-receipt {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      /* Page setup for thermal printer */
      @page {
        size: 80mm auto;
        margin: 0;
      }

      /* Remove Tailwind's print utilities that might interfere */
      .hidden {
        display: block !important;
      }
    }
  </style>
