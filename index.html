<head>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'midnight': {
              '50': '#f8fafc',
              '100': '#f1f5f9',
              '200': '#e2e8f0',
              '300': '#cbd5e1',
              '400': '#94a3b8',
              '500': '#64748b',
              '600': '#475569',
              '700': '#334155',
              '800': '#1e293b',
              '900': '#0f172a',
              '950': '#020617',
            },
            'gold': {
              '50': '#fefce8',
              '100': '#fef9c3',
              '200': '#fef08a',
              '300': '#fde047',
              '400': '#facc15',
              '500': '#eab308',
              '600': '#ca8a04',
              '700': '#a16207',
              '800': '#854d0e',
              '900': '#713f12',
              '950': '#422006',
            },
            'aura': {
              'primary': '#e2b808',
              'secondary': '#38bdf8',
              'accent': '#0f172a',
              'dark': '#1e293b',
              'light': '#f8fafc',
            }
          },
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
            'heading': ['Oswald', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      /* Midnight Gold - deep slate blue */
      color: #f8fafc;
      /* off-white */
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-heading {
      font-family: 'Oswald', sans-serif;
      color: #e2b808;
      /* old gold accent */
    }

    /* Custom Scrollbar for Midnight Gold theme */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
      /* sidebar/card background */
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      /* border color */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* Accent colors */
    .text-accent-gold {
      color: #e2b808;
    }

    .text-accent-info {
      color: #38bdf8;
    }

    .bg-accent-gold {
      background-color: #e2b808;
    }

    .bg-accent-info {
      background-color: #38bdf8;
    }

    /* PRINT STYLES - Optimized for 80mm Thermal Printers */
    @media print {

      /* Hide everything */
      body * {
        visibility: hidden;
      }

      /* Show only the receipt */
      #printable-receipt,
      #printable-receipt * {
        visibility: visible;
      }

      #printable-receipt {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      /* Page setup for thermal printer */
      @page {
        size: 80mm auto;
        margin: 0;
      }

      /* Remove Tailwind's print utilities that might interfere */
      .hidden {
        display: block !important;
      }
    }
  </style>

  }
}
</script>
